services:
  # 1. PostgreSQL Database
  - type: pgo
    name: ratemystore-db
    plan: free
    postgresMajorVersion: 15

  # 2. Node.js Backend API
  - type: web
    name: ratemystore-api
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ratemystore-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ratemystore-frontend.onrender.com

  # 3. React/Vite Frontend
  - type: web
    name: ratemystore-frontend
    env: static
    plan: free
    region: ohio
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://ratemystore-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
